<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sexo — Quiz Astrológico</title>
<link rel="stylesheet" href="../assets/shared.css">
<script src="../assets/audio.js"></script>
<style>
.gender-card {
  background: var(--opt-bg);
  border: 1px solid var(--opt-border);
  border-radius: 20px; padding: 28px 16px 20px;
  cursor: pointer; flex: 1;
  transition: all 0.28s cubic-bezier(0.22,1,0.36,1);
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  position: relative; overflow: hidden;
}
.gender-card::before {
  content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background: linear-gradient(90deg,transparent,rgba(196,164,72,0.28),transparent);
  opacity:0; transition:opacity 0.3s;
}
.gender-card:hover {
  background: var(--opt-bg-h); border-color: var(--opt-border-h);
  transform: translateY(-4px) scale(1.03);
  box-shadow: 0 10px 36px rgba(0,0,0,0.5), 0 0 20px rgba(196,164,72,0.12);
}
.gender-card:hover::before { opacity:1; }
.gender-card:active { transform:scale(0.96); }
.gender-card.selected {
  background: rgba(42,30,12,0.98);
  border-color: rgba(196,164,72,0.65);
  box-shadow: 0 0 28px rgba(196,164,72,0.22), 0 10px 40px rgba(0,0,0,0.55);
  transform: scale(1.03);
}
.gender-label { font-size:14px; font-weight:600; color:var(--text); letter-spacing:0.3px; }
.radio-ring {
  width:20px; height:20px; border-radius:50%;
  border:1.5px solid rgba(196,164,72,0.4);
  display:flex; align-items:center; justify-content:center;
  transition: border-color 0.2s;
}
.gender-card.selected .radio-ring { border-color:var(--gold); }
.radio-ring::after {
  content:''; width:10px; height:10px; border-radius:50%;
  background: var(--gold); opacity:0; transition:opacity 0.2s;
}
.gender-card.selected .radio-ring::after { opacity:1; }
</style>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>
<div class="page">

  <header class="header anim-1">
    <div class="header-alert" id="headerAlert">Alerta de Maio</div>
    <p class="header-title">
      3 Signos Estão Perdendo <u>Dinheiro e Amor</u> Para Outras Pessoas —
      <span class="hl">O Seu é Um Deles?</span>
    </p>
    <div class="gold-divider"></div>
    <p class="header-sub">
      Teste rápido de 30 segundos revela o que está bloqueando sua energia <span class="hl">(e como liberar)</span>.
    </p>
  </header>

  <div class="main-card anim-2">
    <h2 class="card-title">Qual seu sexo?</h2>

    <div style="display:flex;gap:14px;">

      <div class="gender-card" id="cardM" onclick="pick('Masculino')">
        <svg width="62" height="62" viewBox="0 0 62 62" fill="none">
          <circle cx="31" cy="18" r="9" stroke="#C4A44A" stroke-width="2" fill="rgba(196,164,72,0.08)"/>
          <path d="M19 54 L19 36 Q19 27 31 27 Q43 27 43 36 L43 54" stroke="#C4A44A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="25" y1="42" x2="25" y2="54" stroke="rgba(196,164,72,0.5)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="37" y1="42" x2="37" y2="54" stroke="rgba(196,164,72,0.5)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="19" y1="36" x2="12" y2="46" stroke="rgba(196,164,72,0.4)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="43" y1="36" x2="50" y2="46" stroke="rgba(196,164,72,0.4)" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="gender-label">Masculino</span>
        <div class="radio-ring"></div>
      </div>

      <div class="gender-card" id="cardF" onclick="pick('Feminino')">
        <svg width="62" height="62" viewBox="0 0 62 62" fill="none">
          <circle cx="31" cy="18" r="9" stroke="#C4A44A" stroke-width="2" fill="rgba(196,164,72,0.08)"/>
          <path d="M20 27 Q31 25 42 27 L46 54 L16 54 Z" stroke="#C4A44A" stroke-width="2" fill="rgba(196,164,72,0.06)" stroke-linejoin="round"/>
          <line x1="25" y1="43" x2="25" y2="54" stroke="rgba(196,164,72,0.4)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="37" y1="43" x2="37" y2="54" stroke="rgba(196,164,72,0.4)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="20" y1="31" x2="12" y2="43" stroke="rgba(196,164,72,0.35)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="42" y1="31" x2="50" y2="43" stroke="rgba(196,164,72,0.35)" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="gender-label">Feminino</span>
        <div class="radio-ring"></div>
      </div>

    </div>

    <button class="back-btn" onclick="history.back()">Voltar</button>
  </div>

</div>
<script>
const bg=document.getElementById('bgLayer');
const wc=['rgba(255,235,180,VAR)','rgba(255,215,140,VAR)','rgba(220,180,110,VAR)','rgba(255,250,230,VAR)'];
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*1.8+0.4;const c=wc[Math.floor(Math.random()*wc.length)].replace('VAR',(0.3+Math.random()*0.5).toFixed(2));s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};--dur:${3+Math.random()*5}s;--delay:-${Math.random()*6}s;--op:${(0.4+Math.random()*0.5).toFixed(2)};`;bg.appendChild(s);}
function pick(sexo){
  document.querySelectorAll('.gender-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById(sexo==='Masculino'?'cardM':'cardF').classList.add('selected');
  localStorage.setItem('sexo',sexo);
  setTimeout(()=>{window.location.href='page6.html';},320);
}
</script>
<script>
(function(){
  var m=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  var n=new Date(),el=document.getElementById("headerAlert");
  if(el) el.textContent="Alerta de "+n.getDate()+" de "+m[n.getMonth()];
})();
</script>
</body>
</html>
