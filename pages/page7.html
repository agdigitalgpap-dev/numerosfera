<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio — Quiz Astrológico</title>
<link rel="stylesheet" href="../assets/shared.css">
<script src="../assets/audio.js"></script>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>
<div class="page">

  <header class="header anim-1">
    <div class="header-alert">Alerta de Maio</div>
    <p class="header-title">
      3 Signos Estão Perdendo <u>Dinheiro e Amor</u> Para Outras Pessoas —
      <span class="hl">O Seu é Um Deles?</span>
    </p>
    <div class="gold-divider"></div>
    <p class="header-sub">
      Teste rápido de 30 segundos revela o que está bloqueando sua energia <span class="hl">(e como liberar)</span>.
    </p>
  </header>

  <div class="main-card anim-2">
    <h2 class="card-title">Qual maior desafio da sua vida no momento?</h2>

    <div class="grid-2">

      <div class="opt-card" onclick="pick('Minha vida amorosa',this)">
        <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
          <circle cx="25" cy="25" r="23" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.18)" stroke-width="1"/>
          <path d="M25 36 Q14 27 14 20 Q14 15 19.5 15 Q22 15 25 19 Q28 15 30.5 15 Q36 15 36 20 Q36 27 25 36Z" stroke="#C4A44A" stroke-width="2" fill="rgba(196,164,72,0.08)" stroke-linejoin="round"/>
          <path d="M20 19 Q16 15 13 19" stroke="rgba(196,164,72,0.4)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
          <path d="M30 19 Q34 15 37 19" stroke="rgba(196,164,72,0.4)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        </svg>
        <span class="opt-label">Minha vida amorosa</span>
      </div>

      <div class="opt-card" onclick="pick('Minhas finanças',this)">
        <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
          <circle cx="25" cy="25" r="23" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.18)" stroke-width="1"/>
          <path d="M25 38 Q16 38 16 30 Q16 22 25 22 Q34 22 34 30 Q34 38 25 38Z" stroke="#C4A44A" stroke-width="2" fill="rgba(196,164,72,0.07)"/>
          <path d="M21 22 Q21 18 25 17 Q29 18 29 22" stroke="rgba(196,164,72,0.55)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <line x1="22" y1="17" x2="28" y2="17" stroke="rgba(196,164,72,0.4)" stroke-width="1.5" stroke-linecap="round"/>
          <text x="25" y="33" text-anchor="middle" font-size="10" font-weight="700" fill="#C4A44A" font-family="Poppins">$</text>
        </svg>
        <span class="opt-label">Minhas finanças</span>
      </div>

      <div class="opt-card" onclick="pick('Minha saúde',this)">
        <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
          <circle cx="25" cy="25" r="23" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.18)" stroke-width="1"/>
          <rect x="21" y="13" width="8" height="24" rx="3" stroke="#C4A44A" stroke-width="2" fill="rgba(196,164,72,0.06)"/>
          <rect x="13" y="21" width="24" height="8" rx="3" stroke="rgba(196,164,72,0.55)" stroke-width="2" fill="rgba(196,164,72,0.04)"/>
          <path d="M16 39 L20 39 L22 36 L25 42 L28 35 L30 39 L34 39" stroke="rgba(196,164,72,0.6)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="opt-label">Minha saúde</span>
      </div>

      <div class="opt-card" onclick="pick('Minha felicidade',this)">
        <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
          <circle cx="25" cy="25" r="23" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.18)" stroke-width="1"/>
          <circle cx="25" cy="16" r="5" stroke="#C4A44A" stroke-width="2" fill="rgba(196,164,72,0.08)"/>
          <path d="M25 21 L25 34" stroke="#C4A44A" stroke-width="2" stroke-linecap="round"/>
          <line x1="25" y1="34" x2="21" y2="39" stroke="rgba(196,164,72,0.55)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="25" y1="34" x2="29" y2="39" stroke="rgba(196,164,72,0.55)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="25" y1="27" x2="17" y2="21" stroke="rgba(196,164,72,0.4)" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="25" y1="27" x2="33" y2="21" stroke="rgba(196,164,72,0.4)" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M13 12 L14.5 14 L17 13" stroke="rgba(196,164,72,0.5)" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M33 12 L34.5 14 L37 13" stroke="rgba(196,164,72,0.5)" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="opt-label">Minha felicidade</span>
      </div>

    </div>

    <button class="back-btn" onclick="history.back()">Voltar</button>
  </div>

</div>
<script>
const bg=document.getElementById('bgLayer');
const wc=['rgba(255,235,180,VAR)','rgba(255,215,140,VAR)','rgba(220,180,110,VAR)','rgba(255,250,230,VAR)'];
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*1.8+0.4;const c=wc[Math.floor(Math.random()*wc.length)].replace('VAR',(0.3+Math.random()*0.5).toFixed(2));s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};--dur:${3+Math.random()*5}s;--delay:-${Math.random()*6}s;--op:${(0.4+Math.random()*0.5).toFixed(2)};`;bg.appendChild(s);}
function pick(v,el){document.querySelectorAll('.opt-card').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');localStorage.setItem('desafioAtual',v);setTimeout(()=>{window.location.href='page8.html';},320);}
</script>
</body>
</html>
