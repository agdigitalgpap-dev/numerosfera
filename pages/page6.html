<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado Civil — Quiz Astrológico</title>
<link rel="stylesheet" href="../assets/shared.css">
<script src="../assets/audio.js"></script>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>
<div class="page">

  <header class="header anim-1">
    <div class="header-alert">Alerta de Maio</div>
    <p class="header-title">
      3 Signos Estão Perdendo <u>Dinheiro e Amor</u> Para Outras Pessoas —
      <span class="hl">O Seu é Um Deles?</span>
    </p>
    <div class="gold-divider"></div>
    <p class="header-sub">
      Teste rápido de 30 segundos revela o que está bloqueando sua energia <span class="hl">(e como liberar)</span>.
    </p>
  </header>

  <div class="main-card anim-2">
    <h2 class="card-title">Qual seu Estado civil?</h2>

    <div class="grid-2">

      <div class="opt-card" onclick="pick('Casado(a)',this)">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <circle cx="23" cy="23" r="21" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.2)" stroke-width="1"/>
          <circle cx="17" cy="23" r="8" stroke="#C4A44A" stroke-width="2" fill="none"/>
          <circle cx="29" cy="23" r="8" stroke="rgba(196,164,72,0.55)" stroke-width="2" fill="none"/>
        </svg>
        <span class="opt-label">Casado(a)</span>
      </div>

      <div class="opt-card" onclick="pick('Relacionamento',this)">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <circle cx="23" cy="23" r="21" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.2)" stroke-width="1"/>
          <path d="M23 32 Q13 25 13 18 Q13 13 18.5 13 Q21 13 23 17 Q25 13 27.5 13 Q33 13 33 18 Q33 25 23 32Z" stroke="#C4A44A" stroke-width="2" fill="rgba(196,164,72,0.08)" stroke-linejoin="round"/>
        </svg>
        <span class="opt-label">Relacionamento</span>
      </div>

      <div class="opt-card" onclick="pick('Noivo(a)',this)">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <circle cx="23" cy="23" r="21" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.2)" stroke-width="1"/>
          <circle cx="23" cy="23" r="10" stroke="#C4A44A" stroke-width="2" fill="none"/>
          <circle cx="23" cy="23" r="6" stroke="rgba(196,164,72,0.5)" stroke-width="1.5" fill="none"/>
          <circle cx="23" cy="13" r="3.5" fill="rgba(196,164,72,0.25)" stroke="#C4A44A" stroke-width="1.5"/>
        </svg>
        <span class="opt-label">Noivo(a)</span>
      </div>

      <div class="opt-card" onclick="pick('Sozinho(a)',this)">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <circle cx="23" cy="23" r="21" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.2)" stroke-width="1"/>
          <path d="M23 32 Q13 25 13 18 Q13 13 18.5 13 Q21 13 23 17 Q25 13 27.5 13 Q33 13 33 18 Q33 25 23 32Z" stroke="rgba(196,164,72,0.4)" stroke-width="2" fill="none" stroke-linejoin="round"/>
        </svg>
        <span class="opt-label">Sozinho(a)</span>
      </div>

      <div class="opt-card" onclick="pick('Separado(a)',this)">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <circle cx="23" cy="23" r="21" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.2)" stroke-width="1"/>
          <rect x="11" y="16" width="11" height="14" rx="3" stroke="#C4A44A" stroke-width="2" fill="none"/>
          <rect x="24" y="16" width="11" height="14" rx="3" stroke="rgba(196,164,72,0.5)" stroke-width="2" fill="none"/>
          <line x1="22.5" y1="16" x2="22.5" y2="30" stroke="rgba(196,164,72,0.18)" stroke-width="1" stroke-dasharray="2 3"/>
        </svg>
        <span class="opt-label">Separado(a)</span>
      </div>

      <div class="opt-card" onclick="pick('Viúvo(a)',this)">
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <circle cx="23" cy="23" r="21" fill="rgba(196,164,72,0.05)" stroke="rgba(196,164,72,0.2)" stroke-width="1"/>
          <path d="M23 32 Q13 25 13 18 Q13 13 18.5 13 Q21 13 23 17 Q25 13 27.5 13 Q33 13 33 18 Q33 25 23 32Z" stroke="#C4A44A" stroke-width="2" fill="none" stroke-linejoin="round"/>
          <path d="M23 17 L21 23 L25 23 L23 29" stroke="rgba(196,164,72,0.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="opt-label">Viúvo(a)</span>
      </div>

    </div>

    <button class="back-btn" onclick="history.back()">Voltar</button>
  </div>

</div>
<script>
const bg=document.getElementById('bgLayer');
const wc=['rgba(255,235,180,VAR)','rgba(255,215,140,VAR)','rgba(220,180,110,VAR)','rgba(255,250,230,VAR)'];
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*1.8+0.4;const c=wc[Math.floor(Math.random()*wc.length)].replace('VAR',(0.3+Math.random()*0.5).toFixed(2));s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};--dur:${3+Math.random()*5}s;--delay:-${Math.random()*6}s;--op:${(0.4+Math.random()*0.5).toFixed(2)};`;bg.appendChild(s);}
function pick(v,el){document.querySelectorAll('.opt-card').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');localStorage.setItem('estadoCivil',v);setTimeout(()=>{window.location.href='page7.html';},320);}
</script>
</body>
</html>
