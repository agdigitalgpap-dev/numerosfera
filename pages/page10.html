<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sua Leitura Personalizada — Quiz Astrológico</title>
<link rel="stylesheet" href="../assets/shared.css">
<script src="../assets/audio.js"></script>
<style>
body { display:flex; align-items:center; justify-content:center; }

.page { justify-content: center; }

/* ── Teaser ── */
.teaser {
  text-align: center; margin-bottom: 20px;
  font-size: 13px; font-weight: 400; color: var(--text-dim);
  line-height: 1.65; max-width: 300px;
  font-style: italic; letter-spacing: 0.2px;
}
.teaser strong { color: var(--gold-light); font-style: normal; font-weight: 600; }

/* ── Countdown ring ── */
.cdown-wrap {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 28px;
  transition: opacity 0.6s ease, max-height 0.6s ease, margin 0.5s ease;
  overflow: hidden; max-height: 200px;
}
.cdown-wrap.hidden { opacity:0; max-height:0; margin-bottom:0; pointer-events:none; }

.ring-cont { position:relative; width:96px; height:96px; }
.ring-svg { transform:rotate(-90deg); }
.ring-track { fill:none; stroke:rgba(196,164,72,0.12); stroke-width:5; }
.ring-fill {
  fill:none; stroke:url(#rg); stroke-width:5; stroke-linecap:round;
  stroke-dasharray:251.2; stroke-dashoffset:0;
  transition: stroke-dashoffset 1s linear;
}
.ring-inner {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.cdown-num {
  font-size:32px; font-weight:800; line-height:1;
  letter-spacing:-1px; color: var(--text);
}
.cdown-lbl {
  font-size:9px; font-weight:600; letter-spacing:2px;
  text-transform:uppercase; color:var(--text-dimmer); margin-top:1px;
}
.cdown-msg {
  margin-top:10px; font-size:11px; color:var(--text-dimmer);
  font-style:italic; letter-spacing:0.3px;
  transition:opacity 0.3s;
}

/* ── Form section ── */
.form-section { width:100%; }
.form-title {
  font-size:22px; font-weight:800; color:var(--text);
  margin-bottom:4px; line-height:1.25; letter-spacing:0.2px;
}
.form-title span { color:var(--lilac); font-style:italic; }
.form-sub {
  font-size:12px; color:var(--text-dimmer);
  margin-bottom:20px; line-height:1.5;
}

/* ── Lock bar ── */
.lock-bar {
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-top:12px; transition:opacity 0.4s;
}
.lock-bar.gone { opacity:0; pointer-events:none; height:0; overflow:hidden; margin:0; }
.ld { width:6px; height:6px; border-radius:50%; background:rgba(196,164,72,0.4);
  animation:ld-p 1.5s ease-in-out infinite; }
.ld:nth-child(2){animation-delay:0.3s;} .ld:nth-child(3){animation-delay:0.6s;}
@keyframes ld-p{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:0.8;transform:scale(1.3)}}
.lock-txt { font-size:10px; color:var(--text-dimmer); letter-spacing:0.5px; }

/* ── Unlock animation ── */
@keyframes unlockPop {
  0%{opacity:0;transform:scale(0.92)} 60%{transform:scale(1.03)} 100%{opacity:1;transform:scale(1)}
}
.unlocked { animation:unlockPop 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
</style>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>
<div class="page">

  <p class="teaser anim-1">
    <strong>Quase lá.</strong> Digite o seu e-mail para receber o restante da sua leitura personalizada...
  </p>

  <div class="main-card anim-2" style="width:100%;max-width:400px;">

    <!-- Countdown -->
    <div class="cdown-wrap" id="cdownWrap">
      <div class="ring-cont">
        <svg class="ring-svg" width="96" height="96" viewBox="0 0 96 96">
          <defs>
            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#9A7A2C"/>
              <stop offset="100%" stop-color="#E8D08A"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="48" cy="48" r="40"/>
          <circle class="ring-fill" id="ringFill" cx="48" cy="48" r="40"/>
        </svg>
        <div class="ring-inner">
          <span class="cdown-num" id="cdownNum">30</span>
          <span class="cdown-lbl">seg</span>
        </div>
      </div>
      <p class="cdown-msg" id="cdownMsg">Preparando sua leitura exclusiva...</p>
    </div>

    <!-- Form -->
    <div class="form-section" id="formSection">
      <h2 class="form-title">Qual é o seu <span>Email?</span></h2>
      <p class="form-sub">Enviaremos sua leitura astrológica completa</p>

      <input
        type="email" id="emailInput" class="prem-input"
        placeholder="Insira seu endereço de e-mail (obrigatório)"
        disabled autocomplete="email" maxlength="120"
      />
      <p class="error-msg" id="errMsg">Por favor, insira um e-mail válido.</p>

      <button class="cta-btn" id="ctaBtn" onclick="submit()" disabled>
        Clique para continuar
      </button>

      <div class="lock-bar" id="lockBar">
        <div class="ld"></div><div class="ld"></div><div class="ld"></div>
        <span class="lock-txt">Aguarde — carregando sua análise</span>
      </div>
    </div>

  </div>
</div>

<script>
const bg=document.getElementById('bgLayer');
const wc=['rgba(255,235,180,VAR)','rgba(255,215,140,VAR)','rgba(220,180,110,VAR)','rgba(255,250,230,VAR)'];
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*1.8+0.4;const c=wc[Math.floor(Math.random()*wc.length)].replace('VAR',(0.3+Math.random()*0.5).toFixed(2));s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};--dur:${3+Math.random()*5}s;--delay:-${Math.random()*6}s;--op:${(0.4+Math.random()*0.5).toFixed(2)};`;bg.appendChild(s);}

const TOTAL=30, circ=2*Math.PI*40;
const ring=document.getElementById('ringFill');
const num=document.getElementById('cdownNum');
const msg=document.getElementById('cdownMsg');
const wrap=document.getElementById('cdownWrap');
const inp=document.getElementById('emailInput');
const btn=document.getElementById('ctaBtn');
const lb=document.getElementById('lockBar');
const fs=document.getElementById('formSection');

ring.style.strokeDasharray=circ; ring.style.strokeDashoffset=0;

const msgs=['Preparando sua leitura exclusiva...','Analisando seus astros...','Calculando seu mapa energético...','Identificando bloqueios ocultos...','Sua leitura está quase pronta...'];
let mi=0;
const msgT=setInterval(()=>{mi=(mi+1)%msgs.length;msg.style.opacity='0';setTimeout(()=>{msg.textContent=msgs[mi];msg.style.opacity='1';},250);},5000);

let rem=TOTAL; num.textContent=rem;
const tick=setInterval(()=>{
  rem--;
  num.textContent=rem;
  ring.style.strokeDashoffset=circ*(rem/TOTAL);
  if(rem<=0){clearInterval(tick);clearInterval(msgT);unlock();}
},1000);

function unlock(){
  wrap.classList.add('hidden');
  fs.classList.add('unlocked');
  setTimeout(()=>{inp.disabled=false;btn.disabled=false;lb.classList.add('gone');inp.focus();},200);
}

inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});

function submit(){
  if(btn.disabled)return;
  const v=inp.value.trim();
  const err=document.getElementById('errMsg');
  if(!v||!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v)){
    err.style.display='block';
    inp.classList.add('shake');
    inp.style.borderColor='rgba(200,100,100,0.5)';
    setTimeout(()=>{inp.classList.remove('shake');inp.style.borderColor='';},400);
    return;
  }
  err.style.display='none';
  localStorage.setItem('email',v);
  btn.textContent='✓ Redirecionando...';
  btn.style.background='linear-gradient(135deg,#2a1a0a,#4a3010)';
  btn.style.color='var(--gold-light)';
  setTimeout(()=>{window.location.href='../vsl2.html';},600);
}
</script>
</body>
</html>
